name: Compile CV

on:
  push:
    branches:
      - main
    paths:
      - 'cv/**'
      - 'revolut-so/**'
      - 'revolut-pot/**'
      - 'blackrock-am/**'
      - 'blackrock-rqa-audit/**'
      - 'blackrock-client-experience/**'
      - 'edf-trading/**'
      - '.github/workflows/compile-cv.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile default CV
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex
          working_directory: cv
          compiler: xelatex
          args: -file-line-error -halt-on-error -interaction=nonstopmode

      - name: Compile Revolut Strategy & Operations CV
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex
          working_directory: revolut-so
          compiler: xelatex
          args: -file-line-error -halt-on-error -interaction=nonstopmode

      - name: Compile Revolut Product Owner (Technical) CV
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex
          working_directory: revolut-pot
          compiler: xelatex
          args: -file-line-error -halt-on-error -interaction=nonstopmode

      - name: Compile BlackRock Analytics & Modeling CV
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex
          working_directory: blackrock-am
          compiler: xelatex
          args: -file-line-error -halt-on-error -interaction=nonstopmode

      - name: Compile BlackRock RQA + Audit CV
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex
          working_directory: blackrock-rqa-audit
          compiler: xelatex
          args: -file-line-error -halt-on-error -interaction=nonstopmode

      - name: Compile BlackRock Client Experience CV
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex
          working_directory: blackrock-client-experience
          compiler: xelatex
          args: -file-line-error -halt-on-error -interaction=nonstopmode

      - name: Compile EDF Trading Summer Internship CV
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex
          working_directory: edf-trading
          compiler: xelatex
          args: -file-line-error -halt-on-error -interaction=nonstopmode

      - name: Stage compiled PDFs
        run: |
          mkdir -p docs
          cp cv/resume.pdf docs/resume.pdf
          cp revolut-so/resume.pdf docs/revolut-so.pdf
          cp revolut-pot/resume.pdf docs/revolut-pot.pdf
          cp blackrock-am/resume.pdf docs/blackrock-am.pdf
          cp blackrock-rqa-audit/resume.pdf docs/blackrock-rqa-audit.pdf
          cp blackrock-client-experience/resume.pdf docs/blackrock-client-experience.pdf
          cp edf-trading/resume.pdf docs/edf-trading.pdf
          ls -lh docs/

      - name: Commit and push PDFs
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/
          git diff --staged --quiet || git commit -m "Auto-compile CVs"
          git push
